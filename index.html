<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مطعم العم فريد</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #F7E5CF; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const menuData = {
            sections: [
                { id: "fataer", name: "الفطاير الحادقة", items: [
                    { name: "سجق بلدي", prices: { s: 110, m: 175, l: 210 } },
                    { name: "سجق كيري", prices: { s: 155, m: 195, l: 235 } },
                    { name: "فطيرة العم فريد 1", desc: "كباب حلة + بصل مكرمل", prices: { s: 120, m: 175, l: 235 } }
                ]},
                { id: "pizza", name: "البيتزا", items: [
                    { name: "مارجريتا", prices: { s: 95, m: 120, l: 165 } },
                    { name: "تشيكن باربيكيو", prices: { s: 110, m: 165, l: 195 } }
                ]},
                { id: "pasta", name: "المكرونة (باستا)", items: [
                    { name: "الفريدو", desc: "وايت صوص + مشروم + فراخ", price: 118 },
                    { name: "نجرسكو", desc: "وايت صوص + فراخ مشوية", price: 137 }
                ]}
            ],
            contact: {
                address: "6 أكتوبر - الحي الأول - شارع السنترال - 104 أبراج النخيل",
                whatsapp: "201122947479"
            }
        };

        function App() {
            const [page, setPage] = useState('home');

            if (page === 'home') {
                return (
                    <div className="flex flex-col items-center p-6 animate-fadeIn">
                        <img src="3am Farid.png" className="w-40 h-40 mb-4 drop-shadow-xl" alt="لوجو" />
                        <h1 className="text-3xl font-black text-[#9E4624] mb-8">مطعم العم فريد</h1>
                        <div className="grid gap-4 w-full max-w-md">
                            {menuData.sections.map(s => (
                                <button key={s.id} onClick={() => setPage(s.id)} className="bg-[#9E4624] text-white p-5 rounded-2xl font-bold text-xl shadow-lg flex justify-between items-center">
                                    {s.name} <span>←</span>
                                </button>
                            ))}
                            <button onClick={() => setPage('contact')} className="bg-[#2B1A12] text-white p-5 rounded-2xl font-bold text-xl shadow-lg">
                                📍 اطلب الآن / تواصل معنا
                            </button>
                        </div>
                    </div>
                );
            }

            if (page === 'contact') {
                return (
                    <div className="p-6 text-center">
                        <button onClick={() => setPage('home')} className="bg-[#9E4624] text-white px-6 py-2 rounded-full mb-8">رجوع للرئيسية</button>
                        <div className="bg-white p-8 rounded-3xl shadow-xl border-2 border-[#9E4624]">
                            <h2 className="text-2xl font-bold text-[#9E4624] mb-4 text-right">📍 عنواننا:</h2>
                            <p className="text-right mb-8">{menuData.contact.address}</p>
                            <a href={`https://wa.me/${menuData.contact.whatsapp}`} className="bg-[#25D366] text-white w-full py-4 rounded-xl font-bold flex justify-center items-center gap-2">
                                📱 اطلب عبر الواتساب
                            </a>
                        </div>
                    </div>
                );
            }

            const currentSection = menuData.sections.find(s => s.id === page);
            return (
                <div className="p-4">
                    <button onClick={() => setPage('home')} className="bg-[#9E4624] text-white px-6 py-2 rounded-full mb-6">رجوع</button>
                    <h2 className="text-2xl font-bold text-[#9E4624] mb-6 border-b-2 border-[#9E4624] pb-2">{currentSection.name}</h2>
                    <div className="space-y-4">
                        {currentSection.items.map((item, i) => (
                            <div key={i} className="bg-white p-4 rounded-2xl shadow-md border-r-8 border-[#9E4624]">
                                <h3 className="font-bold text-lg">{item.name}</h3>
                                {item.desc && <p className="text-sm text-gray-500">{item.desc}</p>}
                                <div className="mt-3 flex gap-2">
                                    {item.prices ? (
                                        Object.entries(item.prices).map(([k, v]) => (
                                            <span key={k} className="bg-[#F1DCC2] text-[#9E4624] text-xs px-2 py-1 rounded font-bold">
                                                {k === 's' ? 'صغير' : k === 'm' ? 'وسط' : 'كبير'}: {v}
                                            </span>
                                        ))
                                    ) : (
                                        <span className="bg-[#9E4624] text-white px-3 py-1 rounded text-sm">{item.price} ج.م</span>
                                    )}
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
