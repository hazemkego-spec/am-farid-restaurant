<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>مطعم العم فريد</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #F7E5CF; -webkit-tap-highlight-color: transparent; padding-bottom: 90px; }
        .nav-tab.active { color: #9E4624; border-top: 4px solid #9E4624; background: #fff; }
        .category-card { transition: all 0.2s; background: #fff; border-radius: 1.5rem; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .category-card:active { transform: scale(0.95); }
        .add-feedback { animation: pop 0.3s ease-out; }
        @keyframes pop { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const menuData = {
            sections: [
                { id: "fataer", name: "فطاير حادق", icon: "🍕", items: [
                    { name: "فطيرة سجق بلدي", prices: { s: 110, m: 175, l: 210 } },
                    { name: "فطيرة سجق كيري", prices: { s: 155, m: 195, l: 235 } },
                    { name: "فطيرة لحم مفروم بلدي", prices: { s: 125, m: 175, l: 225 } },
                    { name: "فطيرة بسطرمة", prices: { s: 150, m: 225, l: 295 } },
                    { name: "فطيرة بسطرمة كيري", prices: { s: 175, m: 245, l: 265 } },
                    { name: "فطيرة سلامي", prices: { s: 90, m: 155, l: 210 } },
                    { name: "فطيرة رانش", prices: { s: 110, m: 175, l: 215 } },
                    { name: "فطيرة تشيكن باربيكيو", prices: { s: 125, m: 175, l: 220 } },
                    { name: "فطيرة تشيكن مشروم", prices: { s: 140, m: 180, l: 245 } },
                    { name: "فطيرة ميكس جبن", prices: { s: 115, m: 175, l: 225 } },
                    { name: "فطيرة خضار مشروم", prices: { s: 115, m: 170, l: 195 } },
                    { name: "فطيرة ميكس لحوم", prices: { s: 145, m: 195, l: 245 } },
                    { name: "فطيرة تونة قطع", prices: { s: 160, m: 195, l: 225 } },
                    { name: "فطيرة ميكس فراخ", prices: { s: 115, m: 195, l: 250 } },
                    { name: "فطيرة العم فريد 1", desc: "كباب حلة+بصل مكرمل+فلفل الوان", prices: { s: 120, m: 175, l: 235 } },
                    { name: "فطيرة العم فريد 2", desc: "كفتة+فلفل الوان+جبنة موتزاريلا+الصوص الحار", prices: { s: 120, m: 165, l: 210 } },
                    { name: "فطيرة العم فريد 3", desc: "شيش طاووق+فلفل الوان+خضار مشوي+جبنة موتزاريلا", prices: { s: 185, m: 245, l: 310 } }
                ]},
                { id: "sarokh", name: "الصاروخ", icon: "🌯", items: [
                    { name: "صاروخ سجق بلدي", prices: { s: 110, m: 175 } },
                    { name: "صاروخ سجق كيري", prices: { s: 155, m: 195 } },
                    { name: "صاروخ لحمة مفرومة", prices: { s: 125, m: 175 } },
                    { name: "صاروخ بسطرمة", prices: { s: 150, m: 225 } },
                    { name: "صاروخ بسطرمة كيري", prices: { s: 175, m: 245 } },
                    { name: "صاروخ سلامي", prices: { s: 90, m: 155 } },
                    { name: "صاروخ مشكل جبن", prices: { s: 110, m: 175 } },
                    { name: "صاروخ مشروم خضار", prices: { s: 125, m: 175 } },
                    { name: "صاروخ ميكس لحوم", prices: { s: 140, m: 180 } },
                    { name: "صاروخ ميكس فراخ", prices: { s: 115, m: 175 } },
                    { name: "صاروخ تونة", prices: { s: 115, m: 170 } }
                ]},
                { id: "pizza", name: "البيتزا", icon: "🍕", items: [
                    { name: "بيتزا مارجريتا", prices: { s: 95, m: 120, l: 165 } },
                    { name: "بيتزا ميكس جبن", prices: { s: 110, m: 180, l: 210 } },
                    { name: "بيتزا سوبر سوبريم لحم", prices: { s: 135, m: 195, l: 230 } },
                    { name: "بيتزا سلامي", prices: { s: 110, m: 165, l: 195 } },
                    { name: "بيتزا تشيكن باربيكيو", prices: { s: 110, m: 165, l: 195 } },
                    { name: "بيتزا تشيكن رانش", prices: { s: 125, m: 175, l: 230 } },
                    { name: "بيتزا سوبر سوبريم فراخ", prices: { s: 120, m: 175, l: 225 } },
                    { name: "بيتزا العم فريد 1", prices: { s: 120, m: 175, l: 225 } },
                    { name: "بيتزا العم فريد 2", prices: { s: 120, m: 185, l: 215 } },
                    { name: "بيتزا العم فريد 3", prices: { s: 195, m: 245, l: 310 } }
                ]},
                { id: "pasta", name: "الباستا", icon: "🍝", items: [
                    { name: "الفريدو", price: 118, desc: "وايت صوص + مشروم + فراخ" },
                    { name: "مكرونة فرن العم فريد", price: 117, desc: "صوص البشاميل + لحمة مفرومة" },
                    { name: "مكرونة سجق", price: 147 },
                    { name: "نجرسكو", price: 137 },
                    { name: "بولونيز", price: 117 },
                    { name: "اربياتا", price: 67 },
                    { name: "مكرونة بشاميل ريد صوص", price: 147 }
                ]},
                { id: "mashwy", name: "المشاوي", icon: "🍗", items: [
                    { name: "وجبة ميكس فراخ + كفتة", price: 195 },
                    { name: "وجبة كفتة", price: 185 },
                    { name: "وجبة شيش", price: 180 },
                    { name: "ربع فرخة صدر", price: 130 },
                    { name: "ربع فرخة ورك", price: 105 },
                    { name: "نص فرخة", price: 195 },
                    { name: "فرخة كاملة", price: 360 }
                ]},
                { id: "sandwiches", name: "السندوتشات", icon: "🥪", items: [
                    { name: "رغيف حواوشي صغير", price: 55 },
                    { name: "رغيف حواوشي كبير", price: 85 },
                    { name: "سندوتش تشيكن كرسبي", price: 95 },
                    { name: "سندوتش فاهيتا فراخ", price: 95 },
                    { name: "سندوتش كفتة فرنساوي", price: 95 },
                    { name: "سندوتش برجر لحمة", price: 95 }
                ]},
                { id: "sweet", name: "فطاير الحلو", icon: "🍯", items: [
                    { name: "فطيرة كاسترد", prices: { s: 65, m: 80, l: 100 } },
                    { name: "فطيرة نوتيلا موز", prices: { s: 85, m: 125, l: 185 } },
                    { name: "فطيرة كنافة", prices: { s: 95, m: 165, l: 195 } },
                    { name: "فطيرة بسبوسة", prices: { s: 80, m: 110, l: 145 } }
                ]}
            ],
            contact: { whatsapp: "201113338098", address: "6 أكتوبر - الحي الأول - 104 أبراج النخيل" }
        };

        function App() {
            const [activeTab, setActiveTab] = useState('home');
            const [cart, setCart] = useState([]);
            const [client, setClient] = useState({ name: '', phone: '', address: '', loc: '' });
            const [lastOrderNum, setLastOrderNum] = useState(1);
            const [addedId, setAddedId] = useState(null);

            const addToCart = (item, price, size = '') => {
                const itemKey = `${item.name}-${size}`;
                const existing = cart.find(i => `${i.name}-${i.selectedSize}` === itemKey);
                
                if (existing) {
                    setCart(cart.map(i => `${i.name}-${i.selectedSize}` === itemKey ? { ...i, qty: i.qty + 1 } : i));
                } else {
                    setCart([...cart, { ...item, selectedPrice: price, selectedSize: size, qty: 1, note: '' }]);
                }
                
                setAddedId(`${item.name}-${size}`);
                setTimeout(() => setAddedId(null), 800);
            };

            const updateQty = (key, delta) => {
                setCart(cart.map(i => `${i.name}-${i.selectedSize}` === key ? { ...i, qty: Math.max(1, i.qty + delta) } : i));
            };

            const remove = (key) => setCart(cart.filter(i => `${i.name}-${i.selectedSize}` !== key));

            const sendWhatsApp = () => {
                if (!client.name || !client.phone || !client.address || !client.loc) {
                    return alert("يرجى إكمال جميع البيانات: الاسم، الموبايل، العنوان، ورابط اللوكيشن 📍");
                }
                
                let msg = `🛍️ *طلب جديد - مطعم العم فريد*\n`;
                msg += `رقم الفاتورة: #${String(lastOrderNum).padStart(4, '0')}\n`;
                msg += `------------------------------\n`;
                cart.forEach((item, i) => {
                    msg += `${i+1}. *${item.name}* ${item.selectedSize ? `(${item.selectedSize})` : ''}\n`;
                    msg += `   الكمية: ${item.qty} | السعر: ${item.selectedPrice * item.qty} ج\n`;
                    if(item.note) msg += `   📝 ملاحظة: ${item.note}\n`;
                });
                msg += `------------------------------\n`;
                msg += `💰 *الإجمالي:* ${cart.reduce((s,i)=>s+(i.selectedPrice*i.qty),0)} ج.م\n\n`;
                msg += `👤 *العميل:* ${client.name}\n`;
                msg += `📞 *الموبايل:* ${client.phone}\n`;
                msg += `🏠 *العنوان:* ${client.address}\n`;
                msg += `📍 *اللوكيشن:* ${client.loc}\n`;
                
                setLastOrderNum(prev => prev + 1);
                window.open(`https://wa.me/${menuData.contact.whatsapp}?text=${encodeURIComponent(msg)}`);
            };

            return (
                <div className="max-w-md mx-auto min-h-screen">
                    <header className="bg-[#9E4624] text-white p-8 text-center rounded-b-[3rem] shadow-lg">
                        <h1 className="text-3xl font-black italic">العم فريد</h1>
                        <p className="text-xs mt-2 opacity-80 underline">6 أكتوبر - الحي الأول</p>
                    </header>

                    <main className="p-4">
                        {activeTab === 'home' && (
                            <div className="grid grid-cols-2 gap-4 mt-2">
                                {menuData.sections.map(s => (
                                    <div key={s.id} onClick={() => setActiveTab(s.id)} className="category-card p-6 flex flex-col items-center justify-center">
                                        <span className="text-4xl mb-2">{s.icon}</span>
                                        <span className="font-bold text-gray-800 text-sm">{s.name}</span>
                                    </div>
                                ))}
                            </div>
                        )}

                        {menuData.sections.some(s => s.id === activeTab) && (
                            <div className="animate-fadeIn">
                                <button onClick={() => setActiveTab('home')} className="mb-4 text-[#9E4624] font-bold">← القائمة</button>
                                {menuData.sections.find(s=>s.id===activeTab).items.map((item, i) => (
                                    <div key={i} className="bg-white p-4 rounded-2xl shadow-sm mb-3 border-r-4 border-[#9E4624]">
                                        <div className="font-black text-gray-800">{item.name}</div>
                                        {item.desc && <div className="text-[10px] text-gray-400 mb-2">{item.desc}</div>}
                                        <div className="flex flex-row gap-2 mt-2">
                                            {item.prices ? Object.entries(item.prices).map(([sz, p]) => (
                                                <button key={sz} onClick={() => addToCart(item, p, sz)} 
                                                    className={`${addedId === `${item.name}-${sz}` ? 'bg-green-500 text-white scale-95' : 'bg-[#F1DCC2] text-[#9E4624]'} flex-1 py-2 rounded-xl text-[10px] font-black transition-all`}>
                                                    {addedId === `${item.name}-${sz}` ? 'تم ✅' : `${sz==='s'?'صغير':sz==='m'?'وسط':'كبير'}: ${p}ج`}
                                                </button>
                                            )) : (
                                                <button onClick={() => addToCart(item, item.price)} 
                                                    className={`${addedId === `${item.name}-` ? 'bg-green-500 text-white' : 'bg-[#9E4624] text-white'} w-full py-2 rounded-xl font-bold transition-all`}>
                                                    {addedId === `${item.name}-` ? 'أضيف للسلة ✅' : `إضافة ${item.price} ج`}
                                                </button>
                                            )}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}

                        {activeTab === 'cart' && (
                            <div className="text-sm">
                                <h2 className="text-xl font-black mb-4 text-[#9E4624]">طلباتك 🛒</h2>
                                {cart.map(item => {
                                    const key = `${item.name}-${item.selectedSize}`;
                                    return (
                                        <div key={key} className="bg-white p-3 rounded-xl mb-2 shadow-sm border border-gray-100 scale-95">
                                            <div className="flex justify-between font-bold">
                                                <span>{item.name} {item.selectedSize && `(${item.selectedSize})`}</span>
                                                <div className="flex items-center gap-3 bg-gray-50 px-2 rounded-lg">
                                                    <button onClick={()=>updateQty(key, -1)} className="text-[#9E4624] font-black">-</button>
                                                    <span className="text-xs">{item.qty}</span>
                                                    <button onClick={()=>updateQty(key, 1)} className="text-[#9E4624] font-black">+</button>
                                                </div>
                                            </div>
                                            <textarea placeholder="ملاحظات..." className="w-full mt-2 p-2 bg-gray-50 rounded text-[10px] h-8 border-none" 
                                                onChange={e => setCart(cart.map(i=>`${i.name}-${i.selectedSize}`===key?{...i, note: e.target.value}:i))} />
                                            <div className="flex justify-between items-center mt-1">
                                                <span className="text-[#9E4624] font-black">{item.selectedPrice * item.qty}ج</span>
                                                <button onClick={()=>remove(key)} className="text-red-400 text-[10px]">حذف</button>
                                            </div>
                                        </div>
                                    );
                                })}
                                {cart.length > 0 && (
                                    <div className="bg-white p-5 rounded-3xl mt-4 shadow-xl border-t-4 border-[#9E4624]">
                                        <input placeholder="الاسم" className="w-full mb-2 p-2 rounded-lg bg-gray-50 border-none" onChange={e=>setClient({...client, name: e.target.value})} />
                                        <input placeholder="الموبايل" type="tel" className="w-full mb-2 p-2 rounded-lg bg-gray-50 border-none" onChange={e=>setClient({...client, phone: e.target.value})} />
                                        <input placeholder="العنوان بالتفصيل" className="w-full mb-2 p-2 rounded-lg bg-gray-50 border-none" onChange={e=>setClient({...client, address: e.target.value})} />
                                        <input placeholder="رابط اللوكيشن (Google Maps)" className="w-full mb-4 p-2 rounded-lg bg-gray-50 border-2 border-dashed border-[#9E4624]/30 text-xs" onChange={e=>setClient({...client, loc: e.target.value})} />
                                        <div className="flex justify-between font-black text-lg mb-4"><span>الإجمالي:</span><span>{cart.reduce((s,i)=>s+(i.selectedPrice*i.qty),0)} ج</span></div>
                                        <button onClick={sendWhatsApp} className="w-full bg-[#25D366] text-white py-4 rounded-xl font-black shadow-lg">إرسال الطلب (واتساب) ✅</button>
                                    </div>
                                )}
                            </div>
                        )}

                        {activeTab === 'contact' && (
                            <div className="text-center py-10 bg-white rounded-3xl p-6 shadow-sm">
                                <h2 className="text-2xl font-black text-[#9E4624] mb-4 text-right">📍 نورنا في مطعمنا</h2>
                                <p className="text-right text-gray-600 mb-6 leading-relaxed">{menuData.contact.address}<br/>أمام المعهد الديني</p>
                                <a href={`https://wa.me/${menuData.contact.whatsapp}`} className="block bg-[#25D366] text-white py-4 rounded-2xl font-black">واتساب المبيعات</a>
                            </div>
                        )}
                    </main>

                    <nav className="fixed bottom-0 inset-x-0 bg-white/95 backdrop-blur-md flex justify-around py-4 border-t z-50 shadow-2xl">
                        <button onClick={()=>setActiveTab('home')} className={`flex flex-col items-center flex-1 ${activeTab==='home'?'text-[#9E4624]':'text-gray-400'}`}>🏠<span className="text-[10px] font-bold">الرئيسية</span></button>
                        <button onClick={()=>setActiveTab('cart')} className={`flex flex-col items-center flex-1 relative ${activeTab==='cart'?'text-[#9E4624]':'text-gray-400'}`}>🛒<span className="text-[10px] font-bold">السلة</span>
                            {cart.length > 0 && <span className="absolute -top-1 right-1/4 bg-red-500 text-white text-[8px] w-4 h-4 rounded-full flex items-center justify-center font-black animate-bounce">{cart.length}</span>}
                        </button>
                        <button onClick={()=>setActiveTab('contact')} className={`flex flex-col items-center flex-1 ${activeTab==='contact'?'text-[#9E4624]':'text-gray-400'}`}>📞<span className="text-[10px] font-bold">تواصل معنا</span></button>
                    </nav>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
