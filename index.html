<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>مطعم العم فريد</title>
    <link rel="manifest" href="data:application/manifest+json,{"name":"3am Farid","short_name":"Farid","start_url":".","display":"standalone","background_color":"#F7E5CF","theme_color":"#9E4624"}">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #F7E5CF; -webkit-tap-highlight-color: transparent; }
        .nav-tab.active { color: #9E4624; position: relative; }
        .nav-tab.active::after { content: ''; position: absolute; top: -10px; width: 30px; height: 4px; background: #9E4624; border-radius: 10px; }
        .pwa-modal { animation: slideUp 0.4s ease-out; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // البيانات الكاملة للمنيو
        const menuData = {
            sections: [
                { id: "fataer", name: "فطاير حادق", icon: "🍕", items: [
                    { name: "سجق بلدي", prices: { s: 110, m: 175, l: 210 } },
                    { name: "سجق كيري", prices: { s: 155, m: 195, l: 235 } },
                    { name: "بسطرمة", prices: { s: 150, m: 225, l: 295 } },
                    { name: "فطيرة العم فريد 1", desc: "كباب حلة + بصل مكرمل", prices: { s: 120, m: 175, l: 235 } }
                ]},
                { id: "pizza", name: "بيتزا", icon: "🍕", items: [
                    { name: "مارجريتا", prices: { s: 95, m: 120, l: 165 } },
                    { name: "ميكس جبن", prices: { s: 110, m: 180, l: 210 } },
                    { name: "بيتزا العم فريد 3", prices: { s: 195, m: 245, l: 310 } }
                ]},
                { id: "pasta", name: "باستا", icon: "🍝", items: [
                    { name: "الفريدو", desc: "وايت صوص + مشروم + فراخ", price: 118 },
                    { name: "نجرسكو", price: 137 }
                ]},
                { id: "mashwyat", name: "مشويات", icon: "🍗", items: [
                    { name: "وجبة ميكس فراخ + كفتة", price: 195 },
                    { name: "فرخة كاملة", price: 360 }
                ]},
                { id: "sarokh", name: "صاروخ", icon: "🌯", items: [
                    { name: "صاروخ سجق بلدي", prices: { s: 110, m: 175 } },
                    { name: "صاروخ ميكس لحوم", prices: { s: 140, m: 180 } }
                ]},
                { id: "sweet", name: "فطاير حلو", icon: "🍰", items: [
                    { name: "نوتيلا موز", prices: { s: 85, m: 125, l: 185 } },
                    { name: "بسبوسة", prices: { s: 80, m: 110, l: 145 } }
                ]}
            ],
            contact: {
                whatsapp: "201122947479",
                address: "6 أكتوبر - الحي الأول - شارع السنترال - 104 أبراج النخيل"
            }
        };

        function App() {
            const [activeTab, setActiveTab] = useState('home');
            const [cart, setCart] = useState([]);
            const [showPWA, setShowPWA] = useState(true);
            const [clientInfo, setClientInfo] = useState({ name: '', address: '', location: '' });

            // إضافة للسلة
            const addToCart = (item, price, size = '') => {
                const cartItem = { ...item, selectedPrice: price, selectedSize: size, note: '', cartId: Date.now() };
                setCart([...cart, cartId]); // Simplified logic for demo
                alert(`تم إضافة ${item.name} للسلة`);
            };

            const removeFromCart = (id) => setCart(cart.filter(i => i.cartId !== id));

            const getTotal = () => cart.reduce((sum, item) => sum + item.selectedPrice, 0);

            // رسالة الواتساب الاحترافية (نفس نظام مصنعات اليُمن)
            const sendOrder = () => {
                if (!clientInfo.name || !clientInfo.address) return alert("يرجى ملء بياناتك أولاً");
                
                let orderNum = Math.floor(1000 + Math.random() * 9000);
                let message = `*طلب جديد - مطعم العم فريد* 👨‍🍳\n\n`;
                message += `رقم الفاتورة: ${orderNum}\n`;
                message += `--------------------------\n`;
                cart.forEach((item, i) => {
                    message += `${i+1}. *${item.name}* ${item.selectedSize ? `(${item.selectedSize})` : ''}\n`;
                    message += `   السعر: ${item.selectedPrice} ج.م\n`;
                    if(item.note) message += `   ملاحظة: ${item.note}\n`;
                });
                message += `--------------------------\n`;
                message += `💰 *الإجمالي:* ${getTotal()} ج.م\n\n`;
                message += `👤 *العميل:* ${clientInfo.name}\n`;
                message += `🏠 *العنوان:* ${clientInfo.address}\n`;
                if(clientInfo.location) message += `📍 *الموقع:* ${clientInfo.location}\n`;
                
                window.open(`https://wa.me/${menuData.contact.whatsapp}?text=${encodeURIComponent(message)}`);
            };

            return (
                <div className="pb-24">
                    {/* PWA Modal */}
                    {showPWA && (
                        <div className="fixed inset-0 bg-black/60 z-50 flex items-end pwa-modal">
                            <div className="bg-white w-full p-6 rounded-t-[2.5rem] text-center">
                                <div className="w-12 h-1.5 bg-gray-300 mx-auto mb-4 rounded-full"></div>
                                <img src="3am Farid.png" className="w-20 h-20 mx-auto mb-4 rounded-2xl shadow-lg" />
                                <h3 className="text-xl font-black mb-2">ثبت تطبيق العم فريد على موبايلك!</h3>
                                <p className="text-gray-500 text-sm mb-6">لطلب أسرع بضغطة واحدة وبدون استهلاك للإنترنت</p>
                                <div className="space-y-3">
                                    <div className="bg-gray-50 p-3 rounded-xl text-sm border border-dashed border-[#9E4624]">
                                        اضغط على زر المشاركة <span className="font-bold">Square with arrow</span> ثم اختر <span className="font-bold">Add to Home Screen</span>
                                    </div>
                                    <button onClick={() => setShowPWA(false)} className="bg-[#9E4624] text-white w-full py-4 rounded-2xl font-black text-lg">فهمت، شكراً</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Header */}
                    <div className="bg-[#9E4624] p-8 text-white rounded-b-[3.5rem] shadow-2xl text-center">
                        <img src="3am Farid.png" className="w-28 h-28 mx-auto mb-4 border-4 border-white rounded-full shadow-inner" />
                        <h1 className="text-3xl font-black">مطعم العم فريد</h1>
                    </div>

                    <div className="p-5">
                        {/* الرئيسية: مربعات منظمة */}
                        {activeTab === 'home' && (
                            <div className="grid grid-cols-2 gap-4 animate-fadeIn">
                                {menuData.sections.map(sec => (
                                    <div key={sec.id} onClick={() => setActiveTab(sec.id)} className="bg-white p-6 rounded-[2rem] shadow-sm border-2 border-transparent active:border-[#9E4624] flex flex-col items-center justify-center transition-all">
                                        <span className="text-4xl mb-3">{sec.icon}</span>
                                        <span className="font-black text-[#2B1A12]">{sec.name}</span>
                                    </div>
                                ))}
                            </div>
                        )}

                        {/* صفحات الأقسام */}
                        {menuData.sections.some(s => s.id === activeTab) && (
                            <div>
                                <button onClick={() => setActiveTab('home')} className="mb-6 text-[#9E4624] font-bold">← العودة للرئيسية</button>
                                <h2 className="text-2xl font-black mb-6 text-[#9E4624]">{menuData.sections.find(s=>s.id===activeTab).name}</h2>
                                {menuData.sections.find(s=>s.id===activeTab).items.map((item, i) => (
                                    <div key={i} className="bg-white p-5 rounded-3xl shadow-sm mb-4 border-r-8 border-[#9E4624]">
                                        <h3 className="font-bold text-lg">{item.name}</h3>
                                        <p className="text-xs text-gray-400 mb-4">{item.desc}</p>
                                        <div className="flex flex-wrap gap-2">
                                            {item.prices ? Object.entries(item.prices).map(([sz, p]) => (
                                                <button key={sz} onClick={() => {
                                                    const newItem = {...item, cartId: Date.now(), selectedPrice: p, selectedSize: sz, note: ''};
                                                    setCart([...cart, newItem]);
                                                    alert("تمت الإضافة ✅");
                                                }} className="bg-[#F1DCC2] text-[#9E4624] px-4 py-2 rounded-xl text-xs font-black">
                                                    {sz==='s'?'صغير':sz==='m'?'وسط':'كبير'} : {p}ج
                                                </button>
                                            )) : (
                                                <button onClick={() => {
                                                    const newItem = {...item, cartId: Date.now(), selectedPrice: item.price, note: ''};
                                                    setCart([...cart, newItem]);
                                                    alert("تمت الإضافة ✅");
                                                }} className="bg-[#9E4624] text-white px-6 py-2 rounded-xl font-bold">
                                                    إضافة {item.price} ج.م
                                                </button>
                                            )}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}

                        {/* السلة المتطورة */}
                        {activeTab === 'cart' && (
                            <div className="animate-fadeIn">
                                <h2 className="text-2xl font-black mb-6 text-[#9E4624]">سلة الطلبات 🛒</h2>
                                {cart.length === 0 ? <p className="text-center py-10 text-gray-400">السلة فاضية.. اطلب بسرعة!</p> : (
                                    <>
                                        {cart.map((item, i) => (
                                            <div key={item.cartId} className="bg-white p-4 rounded-2xl mb-3 shadow-sm">
                                                <div className="flex justify-between font-bold">
                                                    <span>{item.name} {item.selectedSize && `(${item.selectedSize})`}</span>
                                                    <button onClick={() => removeFromCart(item.cartId)} className="text-red-500 text-xs">حذف</button>
                                                </div>
                                                <input 
                                                    placeholder="إضافة ملاحظة (بدون بصل، زيادة شطة..)" 
                                                    className="w-full mt-2 text-xs bg-gray-50 p-2 rounded-lg border-none"
                                                    onChange={(e) => {
                                                        const newCart = [...cart];
                                                        newCart[i].note = e.target.value;
                                                        setCart(newCart);
                                                    }}
                                                />
                                                <div className="text-left font-black text-[#9E4624] mt-1">{item.selectedPrice} ج.م</div>
                                            </div>
                                        ))}
                                        <div className="mt-8 bg-white p-6 rounded-3xl shadow-lg border-2 border-[#9E4624]">
                                            <h3 className="font-black mb-4 underline">بيانات التوصيل</h3>
                                            <input placeholder="الاسم بالكامل" className="w-full mb-3 p-3 rounded-xl bg-gray-50 border-none" onChange={e=>setClientInfo({...clientInfo, name: e.target.value})} />
                                            <input placeholder="العنوان بالتفصيل" className="w-full mb-3 p-3 rounded-xl bg-gray-50 border-none" onChange={e=>setClientInfo({...clientInfo, address: e.target.value})} />
                                            <input placeholder="رابط الموقع (اختياري)" className="w-full mb-6 p-3 rounded-xl bg-gray-50 border-none" onChange={e=>setClientInfo({...clientInfo, location: e.target.value})} />
                                            <div className="flex justify-between text-xl font-black mb-6 border-t pt-4">
                                                <span>الإجمالي:</span>
                                                <span>{getTotal()} ج.م</span>
                                            </div>
                                            <button onClick={sendOrder} className="w-full bg-[#25D366] text-white py-4 rounded-2xl font-black text-xl shadow-xl flex items-center justify-center gap-2">
                                                إرسال الطلب واتساب ✅
                                            </button>
                                        </div>
                                    </>
                                )}
                            </div>
                        )}

                        {/* تواصل معنا */}
                        {activeTab === 'contact' && (
                            <div className="text-center animate-fadeIn py-10">
                                <img src="3am Farid.png" className="w-32 h-32 mx-auto mb-6 rounded-full shadow-2xl p-2 bg-white" />
                                <h2 className="text-3xl font-black text-[#9E4624] mb-4">نورنا في العم فريد!</h2>
                                <p className="text-gray-600 mb-8 px-4 leading-relaxed">احنا دايماً في خدمتك، جرب طعم الأصالة والمذاق البيتي المصري في قلب 6 أكتوبر.</p>
                                <div className="bg-white p-6 rounded-[2.5rem] shadow-md border-t-4 border-[#9E4624] mb-6">
                                    <p className="font-black mb-2">📍 عنوانا:</p>
                                    <p className="text-sm text-gray-500 mb-6">{menuData.contact.address}</p>
                                    <a href="https://wa.me/201122947479" className="bg-[#2B1A12] text-white block py-4 rounded-2xl font-bold">كلم العم فريد مباشرة</a>
                                </div>
                            </div>
                        )}
                    </div>

                    {/* Bottom Tabs */}
                    <div className="fixed bottom-0 left-0 right-0 bg-white/80 backdrop-blur-lg flex justify-around py-4 border-t border-gray-100 shadow-2xl z-40">
                        <button onClick={() => setActiveTab('home')} className={`nav-tab flex flex-col items-center ${activeTab==='home'?'active':'text-gray-400'}`}>🏠<span className="text-[10px]">الرئيسية</span></button>
                        <button onClick={() => setActiveTab('cart')} className={`nav-tab flex flex-col items-center relative ${activeTab==='cart'?'active':'text-gray-400'}`}>
                            🛒<span className="text-[10px]">السلة</span>
                            {cart.length > 0 && <span className="absolute -top-1 -right-1 bg-red-500 text-white text-[8px] w-4 h-4 rounded-full flex items-center justify-center">{cart.length}</span>}
                        </button>
                        <button onClick={() => setActiveTab('contact')} className={`nav-tab flex flex-col items-center ${activeTab==='contact'?'active':'text-gray-400'}`}>📍<span className="text-[10px]">تواصل معنا</span></button>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
