<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>مطعم العم فريد</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #F7E5CF; padding-bottom: 90px; }
        .active-tab { color: #9E4624; border-top: 4px solid #9E4624; background: white; transition: all 0.3s; }
        .glass-nav { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        .category-card { transition: transform 0.2s; background: white; border-radius: 1.5rem; }
        .category-card:active { transform: scale(0.95); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const menuData = {
            sections: [
                { id: "fataer", name: "فطاير حادق", icon: "🍕", items: [
                    { name: "سجق بلدي", prices: { s: 110, m: 175, l: 210 } },
                    { name: "سجق كيري", prices: { s: 155, m: 195, l: 235 } },
                    { name: "لحم مفروم بلدي", prices: { s: 125, m: 175, l: 225 } },
                    { name: "بسطرمة", prices: { s: 150, m: 225, l: 295 } },
                    { name: "بسطرمة كيري", prices: { s: 175, m: 245, l: 265 } },
                    { name: "سلامي", prices: { s: 90, m: 155, l: 210 } },
                    { name: "رانش", prices: { s: 110, m: 175, l: 215 } },
                    { name: "تشيكن باربيكيو", prices: { s: 125, m: 175, l: 220 } },
                    { name: "تشيكن مشروم", prices: { s: 140, m: 180, l: 245 } },
                    { name: "ميكس جبن", prices: { s: 115, m: 175, l: 225 } },
                    { name: "ميكس لحوم", prices: { s: 145, m: 195, l: 245 } },
                    { name: "ميكس فراخ", prices: { s: 115, m: 195, l: 250 } },
                    { name: "العم فريد 1", desc: "كباب حلة + بصل مكرمل", prices: { s: 120, m: 175, l: 235 } },
                    { name: "العم فريد 2", desc: "كفتة + موتزاريلا + حار", prices: { s: 120, m: 165, l: 210 } },
                    { name: "العم فريد 3", desc: "شيش + خضار مشوي + موتزاريلا", prices: { s: 185, m: 245, l: 310 } }
                ]},
                { id: "pizza", name: "بيتزا", icon: "🍕", items: [
                    { name: "مارجريتا", prices: { s: 95, m: 120, l: 165 } },
                    { name: "ميكس جبن", prices: { s: 110, m: 180, l: 210 } },
                    { name: "سوبر سوبريم لحم", prices: { s: 135, m: 195, l: 230 } },
                    { name: "تشيكن رانش", prices: { s: 125, m: 175, l: 230 } },
                    { name: "بيتزا العم فريد 1", prices: { s: 120, m: 175, l: 225 } },
                    { name: "بيتزا العم فريد 3", prices: { s: 195, m: 245, l: 310 } }
                ]},
                { id: "sarokh", name: "صاروخ", icon: "🌯", items: [
                    { name: "صاروخ سجق بلدي", prices: { s: 110, m: 175 } },
                    { name: "صاروخ بسطرمة كيري", prices: { s: 175, m: 245 } },
                    { name: "صاروخ ميكس لحوم", prices: { s: 140, m: 180 } },
                    { name: "صاروخ تونة", prices: { s: 115, m: 170 } }
                ]},
                { id: "pasta", name: "باستا", icon: "🍝", items: [
                    { name: "الفريدو", price: 118 },
                    { name: "فرن العم فريد", price: 117 },
                    { name: "نجرسكو", price: 137 },
                    { name: "اربياتا", price: 67 }
                ]},
                { id: "sandwiches", name: "سندوتشات", icon: "🥪", items: [
                    { name: "حواوشي كبير", price: 85 },
                    { name: "تشيكن كرسبي", price: 95 },
                    { name: "كفتة بلدي", price: 75 },
                    { name: "برجر لحمة", price: 95 }
                ]},
                { id: "mashwyat", name: "مشويات", icon: "🍗", items: [
                    { name: "وجبة ميكس فراخ + كفتة", price: 195 },
                    { name: "فرخة كاملة مشوية", price: 360 },
                    { name: "وجبة نص فرخة", price: 195 }
                ]},
                { id: "sweet", name: "حلو", icon: "🍯", items: [
                    { name: "كاسترد", prices: { s: 65, m: 80, l: 100 } },
                    { name: "بلح وقشطة", prices: { s: 95, m: 125, l: 195 } },
                    { name: "نوتيلا موز", prices: { s: 85, m: 125, l: 185 } }
                ]}
            ],
            contact: {
                whatsapp: "201122947479",
                address: "6 أكتوبر - الحي الأول - شارع السنترال - 104 أبراج النخيل - أمام المعهد الديني"
            }
        };

        function App() {
            const [activeTab, setActiveTab] = useState('home');
            const [cart, setCart] = useState([]);
            const [clientInfo, setClientInfo] = useState({ name: '', address: '', location: '' });
            const [showPWA, setShowPWA] = useState(true);

            // إضافة للسلة
            const addToCart = (item, price, size = '') => {
                const cartItem = { 
                    ...item, 
                    id: Date.now() + Math.random(), 
                    selectedPrice: price, 
                    selectedSize: size,
                    note: '',
                    qty: 1 
                };
                setCart([...cart, cartItem]);
            };

            const updateNote = (id, note) => {
                setCart(cart.map(i => i.id === id ? { ...i, note } : i));
            };

            const removeFromCart = (id) => setCart(cart.filter(i => i.id !== id));

            const getTotal = () => cart.reduce((sum, i) => sum + i.selectedPrice, 0);

            // إرسال الواتساب
            const sendOrder = () => {
                if (!clientInfo.name || !clientInfo.address) return alert("من فضلك ادخل الاسم والعنوان");
                
                let orderNum = Math.floor(1000 + Math.random() * 9000);
                let msg = `🛍️ *طلب جديد من مطعم العم فريد*\n`;
                msg += `رقم الطلب: ${orderNum}\n`;
                msg += `------------------------------\n`;
                cart.forEach((item, index) => {
                    msg += `${index + 1}. *${item.name}* ${item.selectedSize ? `(${item.selectedSize})` : ''}\n`;
                    msg += `   السعر: ${item.selectedPrice} ج.م\n`;
                    if(item.note) msg += `   📝 ملاحظة: ${item.note}\n`;
                });
                msg += `------------------------------\n`;
                msg += `💰 *الإجمالي:* ${getTotal()} ج.م\n\n`;
                msg += `👤 *العميل:* ${clientInfo.name}\n`;
                msg += `🏠 *العنوان:* ${clientInfo.address}\n`;
                if(clientInfo.location) msg += `📍 *الموقع:* ${clientInfo.location}\n`;
                msg += `\nشكراً لطلبكم من العم فريد! ✨`;

                window.open(`https://wa.me/${menuData.contact.whatsapp}?text=${encodeURIComponent(msg)}`);
            };

            return (
                <div className="max-w-md mx-auto relative min-h-screen">
                    {/* رسالة PWA */}
                    {showPWA && (
                        <div className="fixed inset-x-0 bottom-24 z-50 px-4 animate-bounce">
                            <div className="bg-white border-2 border-[#9E4624] p-4 rounded-3xl shadow-2xl relative">
                                <button onClick={() => setShowPWA(false)} className="absolute top-2 right-4 text-gray-400">✕</button>
                                <div className="flex items-center gap-3">
                                    <img src="3am Farid.png" className="w-12 h-12 rounded-xl border border-gray-100" />
                                    <div>
                                        <p className="text-xs font-bold text-[#9E4624]">تثبيت أبلكيشن العم فريد 📲</p>
                                        <p className="text-[10px] text-gray-500">اضغط "مشاركة" ثم "إضافة للشاشة الرئيسية"</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Header */}
                    <header className="bg-[#9E4624] p-8 text-center rounded-b-[3.5rem] shadow-xl text-white">
                        <img src="3am Farid.png" className="w-24 h-24 mx-auto mb-3 border-4 border-white rounded-full bg-white shadow-lg" />
                        <h1 className="text-2xl font-black italic">العم فريد - 3am Farid</h1>
                    </header>

                    <main className="p-4">
                        {/* الصفحة الرئيسية - المربعات */}
                        {activeTab === 'home' && (
                            <div className="grid grid-cols-2 gap-4 mt-4">
                                {menuData.sections.map(sec => (
                                    <div key={sec.id} onClick={() => setActiveTab(sec.id)} className="category-card p-6 flex flex-col items-center justify-center shadow-md border-2 border-transparent hover:border-[#9E4624]">
                                        <span className="text-4xl mb-2">{sec.icon}</span>
                                        <span className="font-bold text-gray-800">{sec.name}</span>
                                    </div>
                                ))}
                            </div>
                        )}

                        {/* صفحات الأقسام */}
                        {menuData.sections.some(s => s.id === activeTab) && (
                            <div className="animate-fadeIn">
                                <button onClick={() => setActiveTab('home')} className="mb-4 text-[#9E4624] font-bold">← رجوع</button>
                                <h2 className="text-2xl font-black mb-6 text-[#9E4624]">{menuData.sections.find(s=>s.id===activeTab).name}</h2>
                                {menuData.sections.find(s=>s.id===activeTab).items.map((item, i) => (
                                    <div key={i} className="bg-white p-5 rounded-3xl shadow-sm mb-4 border-r-8 border-[#9E4624]">
                                        <h3 className="font-bold text-lg">{item.name}</h3>
                                        <p className="text-xs text-gray-400 mb-4">{item.desc}</p>
                                        <div className="flex flex-wrap gap-2">
                                            {item.prices ? Object.entries(item.prices).map(([size, price]) => (
                                                <button key={size} onClick={() => {addToCart(item, price, size); alert('تمت الإضافة 🛒');}} 
                                                className="bg-[#F1DCC2] text-[#9E4624] px-4 py-2 rounded-xl text-xs font-black">
                                                    {size === 's' ? 'صغير' : size === 'm' ? 'وسط' : 'كبير'}: {price}ج
                                                </button>
                                            )) : (
                                                <button onClick={() => {addToCart(item, item.price); alert('تمت الإضافة 🛒');}} 
                                                className="bg-[#9E4624] text-white px-6 py-2 rounded-xl font-bold">
                                                    إضافة {item.price} ج.م
                                                </button>
                                            )}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}

                        {/* السلة */}
                        {activeTab === 'cart' && (
                            <div className="animate-fadeIn">
                                <h2 className="text-2xl font-black mb-6 text-[#9E4624]">سلة الطلبات 🛍️</h2>
                                {cart.length === 0 ? <p className="text-center py-20 text-gray-400 italic">السلة خالية.. اطلب من العم فريد الآن!</p> : (
                                    <>
                                        {cart.map((item) => (
                                            <div key={item.id} className="bg-white p-4 rounded-2xl mb-4 shadow-sm relative">
                                                <div className="flex justify-between font-bold text-gray-800">
                                                    <span>{item.name} {item.selectedSize && `(${item.selectedSize})`}</span>
                                                    <span className="text-[#9E4624]">{item.selectedPrice} ج</span>
                                                </div>
                                                <textarea 
                                                    placeholder="أضف ملاحظاتك (بدون بصل، حار جداً...)"
                                                    className="w-full mt-3 p-2 bg-gray-50 rounded-xl text-xs border-none focus:ring-1 focus:ring-[#9E4624]"
                                                    rows="1"
                                                    onChange={(e) => updateNote(item.id, e.target.value)}
                                                ></textarea>
                                                <button onClick={() => removeFromCart(item.id)} className="absolute -top-2 -right-2 bg-red-500 text-white w-6 h-6 rounded-full text-xs">✕</button>
                                            </div>
                                        ))}
                                        <div className="bg-white p-6 rounded-[2.5rem] mt-10 shadow-lg border-2 border-[#9E4624]">
                                            <h3 className="font-black mb-4 underline">بياناتك للتوصيل:</h3>
                                            <input placeholder="الاسم" className="w-full mb-3 p-3 rounded-xl bg-gray-50 border-none" onChange={e=>setClientInfo({...clientInfo, name: e.target.value})} />
                                            <input placeholder="العنوان بالتفصيل" className="w-full mb-3 p-3 rounded-xl bg-gray-50 border-none" onChange={e=>setClientInfo({...clientInfo, address: e.target.value})} />
                                            <input placeholder="رابط الموقع (من جوجل ماب)" className="w-full mb-6 p-3 rounded-xl bg-gray-50 border-none" onChange={e=>setClientInfo({...clientInfo, location: e.target.value})} />
                                            <div className="text-xl font-black flex justify-between border-t pt-4 mb-6">
                                                <span>الإجمالي:</span>
                                                <span>{getTotal()} ج.م</span>
                                            </div>
                                            <button onClick={sendOrder} className="w-full bg-[#25D366] text-white py-4 rounded-2xl font-black text-xl shadow-xl">إرسال عبر واتساب ✅</button>
                                        </div>
                                    </>
                                )}
                            </div>
                        )}

                        {/* تواصل معنا */}
                        {activeTab === 'contact' && (
                            <div className="text-center animate-fadeIn py-10 px-4">
                                <img src="3am Farid.png" className="w-32 h-32 mx-auto mb-6 bg-white rounded-full p-2 shadow-2xl" />
                                <h2 className="text-3xl font-black text-[#9E4624] mb-4">تواصل مع العم فريد</h2>
                                <p className="text-gray-600 mb-8 italic">"طعم زمان، بأيدٍ مصرية أصيلة"</p>
                                <div className="bg-white p-6 rounded-[3rem] shadow-md mb-6 border-t-8 border-[#9E4624]">
                                    <p className="font-black text-gray-800 mb-2">🏠 عنواننا:</p>
                                    <p className="text-sm text-gray-500 mb-6 leading-loose">{menuData.contact.address}</p>
                                    <a href={`https://wa.me/${menuData.contact.whatsapp}`} className="block bg-[#25D366] text-white py-4 rounded-2xl font-black text-lg">واتساب المبيعات 📞</a>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* Navigation Tabs */}
                    <nav className="fixed bottom-0 inset-x-0 glass-nav border-t flex justify-around py-3 z-40 shadow-[0_-10px_20px_rgba(0,0,0,0.05)]">
                        <button onClick={() => setActiveTab('home')} className={`flex flex-col items-center gap-1 ${activeTab==='home'?'text-[#9E4624] font-bold':'text-gray-400'}`}>
                            <span className="text-xl">🏠</span>
                            <span className="text-[10px]">الرئيسية</span>
                        </button>
                        <button onClick={() => setActiveTab('cart')} className={`flex flex-col items-center gap-1 relative ${activeTab==='cart'?'text-[#9E4624] font-bold':'text-gray-400'}`}>
                            <span className="text-xl">🛒</span>
                            <span className="text-[10px]">السلة</span>
                            {cart.length > 0 && <span className="absolute -top-1 -right-1 bg-red-500 text-white text-[8px] w-4 h-4 rounded-full flex items-center justify-center font-bold">{cart.length}</span>}
                        </button>
                        <button onClick={() => setActiveTab('contact')} className={`flex flex-col items-center gap-1 ${activeTab==='contact'?'text-[#9E4624] font-bold':'text-gray-400'}`}>
                            <span className="text-xl">📞</span>
                            <span className="text-[10px]">تواصل معنا</span>
                        </button>
                    </nav>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
